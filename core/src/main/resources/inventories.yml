VERSION: 3

#
# Spawn inventories
# Set the slot to -1 if you don't want to display the item.
#
LOBBY-BASIC:
  NORMAL:
    QUEUE:
      SLOT: 0
      ITEM:
        NAME: "<gold>Queue <gray>(Right-Click)"
        MATERIAL: GOLDEN_SWORD
    UNRANKED:
      SLOT: 0
      ITEM:
        NAME: "<yellow>Unranked Queue <gray>(Right-Click)"
        MATERIAL: WOODEN_SWORD
        DURABILITY: 100
    RANKED:
      SLOT: 1
      ITEM:
        NAME: "<red>Ranked Queue <gray>(Right-Click)"
        MATERIAL: IRON_SWORD
    COSMETICS:
      SLOT: 4
      ITEM:
        NAME: "<light_purple>Cosmetics Hub <gray>(Right-Click)"
        MATERIAL: NETHER_STAR
        LORE:
          - ""
          - "<gray>Customize your style with"
          - "<white>Armor Trims<gray>, <white>Shield Layouts<gray>,"
          - "and <white>Death Effects<gray>."
          - ""
          - "<yellow>Open the cosmetics menu."
        ENCHANTMENTS:
          - "DURABILITY:1"
        FLAGS:
          - "HIDE_ENCHANTS"
    ENABLE-SPECTATE-MODE:
      SLOT: -1
      ITEM:
        NAME: "<green>Enable <yellow>Spectate Mode <gray>(Right-Click)"
        MATERIAL: REDSTONE_TORCH
    PARTY-CREATE:
      SLOT: 7
      ITEM:
        NAME: "<light_purple>Create Party <gray>(Right-Click)"
        MATERIAL: NAME_TAG
    SETTINGS:
      SLOT: -1
      ITEM:
        NAME: "<green>Settings <gray>(Right-Click)"
        MATERIAL: CLOCK
        AMOUNT: 1
        ENCHANTMENTS:
          - "DURABILITY:1"
      FLAGS:
        - "HIDE_POTION_EFFECTS"
    KIT-EDITOR:
      SLOT: 8
      ITEM:
        NAME: "<gold>Kit Editor <gray>(Right-Click)"
        MATERIAL: BOOK
    SETUP:
      SLOT: -1
      ITEM:
        NAME: "<red>Manage Server <gray>(Right-Click)"
        MATERIAL: REDSTONE
    STAFF-MODE:
      SLOT: -1
      ITEM:
        NAME: "<green>Enable <light_purple>Staff Mode <gray>(Right-Click)"
        MATERIAL: PINK_DYE
    REMATCH:
      SLOT: 4
      ITEM:
        NAME: "<gold>Rematch <gray>(Right-Click)"
        MATERIAL: BLAZE_POWDER
    STATISTICS:
      SLOT: -1
      ITEM:
        NAME: "<dark_green>Statistics <gray>(Right-Click)"
        MATERIAL: EMERALD
  EXTRA:
  # HERE YOU CAN PUT THE EXTRA ITEMS LIKE THIS:
  #STUFF-ITEM:
  #  COMMAND: unranked # Don't write the / character before the command.
  #  SLOT: 2
  #  ITEM:
  #    NAME: "<red>Stuff Item"
  #    MATERIAL: DIRT
  #    DAMAGE: 0
  #    LORE:
  #      - ""
  #      - "<light_purple>Lore"
